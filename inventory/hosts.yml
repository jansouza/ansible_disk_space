---
# Ansible Inventory for Disk Space Management
# 
# This is an example inventory file. Customize it for your environment.
# You can organize hosts by function, location, or any logical grouping.

all:
  children:
    # Production servers
    production:
      children:
        webservers:
          hosts:
            web01.example.com:
              ansible_host: 192.168.1.10
            web02.example.com:
              ansible_host: 192.168.1.11
        
        databases:
          hosts:
            db01.example.com:
              ansible_host: 192.168.1.20
            db02.example.com:
              ansible_host: 192.168.1.21
        
        appservers:
          hosts:
            app01.example.com:
              ansible_host: 192.168.1.30
            app02.example.com:
              ansible_host: 192.168.1.31
    
    # Development/Test servers
    development:
      hosts:
        dev01.example.com:
          ansible_host: 192.168.2.10
        test01.example.com:
          ansible_host: 192.168.2.20
    
    # Staging environment
    staging:
      hosts:
        stage01.example.com:
          ansible_host: 192.168.3.10

  vars:
    # Common connection settings
    ansible_user: ansible
    ansible_become: true
    ansible_become_method: sudo
    
    # Python interpreter (adjust based on your systems)
    ansible_python_interpreter: /usr/bin/python3

